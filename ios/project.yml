name: TokenStats
options:
  bundleIdPrefix: com.tokenstats
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  TokenStatsApp:
    type: application
    platform: iOS
    sources:
      - path: TokenStatsApp
      - path: Shared
    settings:
      base:
        INFOPLIST_FILE: TokenStatsApp/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.tokenstats.app
    dependencies:
      - target: TokenStatsWatch

  TokenStatsWatch:
    type: application
    platform: watchOS
    sources:
      - path: TokenStatsWatch
      - path: Shared
    settings:
      base:
        INFOPLIST_FILE: TokenStatsWatch/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.tokenstats.app.watchkitapp
    dependencies: []
