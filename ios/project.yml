name: TokenStats
options:
  bundleIdPrefix: com.tokenstats
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  TokenStatsApp:
    type: application
    platform: iOS
    sources:
      - path: TokenStatsApp
      - path: Shared
    settings:
      base:
        INFOPLIST_FILE: TokenStatsApp/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.tokenstats.app
    dependencies:
      - target: TokenStatsWidgets
      - target: TokenStatsWatch

  TokenStatsWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: TokenStatsWidgets
      - path: Shared
    settings:
      base:
        INFOPLIST_FILE: TokenStatsWidgets/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.tokenstats.app.widgets
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
    entitlements:
      path: TokenStatsWidgets/TokenStatsWidgets.entitlements
    dependencies: []

  TokenStatsWatch:
    type: application
    platform: watchOS
    sources:
      - path: TokenStatsWatch
      - path: Shared
    settings:
      base:
        INFOPLIST_FILE: TokenStatsWatch/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.tokenstats.app.watchkitapp
    dependencies: []
